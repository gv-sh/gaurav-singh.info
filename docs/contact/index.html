<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Add in beginning of head if including math equations -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css" integrity="sha384-vKruj+a13U8yHIkAyGgK1J3ArTLzrFGBbBc0tDp4ad/EyewESeXE/Iv67Aj8gKZ0" crossorigin="anonymous">
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js" integrity="sha384-PwRUT/YqbnEjkZO0zZxNqcxACrXe+j766U2amXcgMg5457rve2Y7I6ZJSm2A0mS4" crossorigin="anonymous"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"
                onload="renderMathInElement(document.body, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                            ],
                            throwOnError : false
                        });"></script>
        <title>Contact</title>
        <link rel="stylesheet" href="https://use.typekit.net/vsr8dth.css">
        <link rel="stylesheet" href="/bundle.css">
    </head>
    <body>
        <!-- Header -->
        <header>
    <h1 class="title">Gaurav Singh</h1>
</header>
        <!-- Sidebar -->
        <aside>
			<ul>
				<li><a  href="/">Home</a></li>
				<li><a  href="/projects/">Projects</a></li>
				<li><a  href="/research/">Research</a></li>
				<li><a  href="/teaching/">Teaching</a></li>
				<li><a  href="/journal/">Journal</a></li>
				<li><a class="active" href="/contact/">Contact</a></li>
			</ul>
		</aside>
        <!-- Main content -->
        <main>
            <style>
  form {
    display: flex;
    flex-direction: column;
    max-width: 400px;
    margin: 0 auto;
  }
  label {
    margin-top: 1rem;
  }
  input,
  textarea {
    padding: 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
  }
  button {
    margin-top: 1rem;
    padding: 0.5rem;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
  }
  button:hover {
    background-color: #0069d9;
  }
</style>
<form action="/submit-contact" method="POST">
  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>
<p><label for="email">Email address:</label>
<input type="email" id="email" name="email" required></p>
<p><label for="message">Message:</label></p>
  <textarea id="message" name="message" required></textarea>
<p><button type="submit">Submit</button></p>
</form>
        </main>
        <!-- Footer -->
        <footer>
    <p>Hosted on <a href="https://github.com/" target="_blank" rel="noopener noreferrer">GitHub</a>. Powered by <a href="https://www.11ty.dev/" target="_blank" rel="noopener noreferrer">11ty</a>. Typography set in <a href="https://typekit.com/fonts/futura-pt" target="_blank" rel="noopener noreferrer">Futura PT</a>.</p>
</footer>
    </body>
</html>
