<script src="https://d3js.org/d3.v7.min.js"></script>
<div id="sitemap"></div>
<script>
  // Data structure based on the generated sitemap.xml
  const data = {
    nodes: [
      { id: "Home", group: 1 },
      { id: "Work", group: 2 },
      { id: "Store", group: 2 },
      { id: "Journal", group: 3 },
      { id: "Projects", group: 4 },
      { id: "Teaching", group: 5 },
      { id: "Research", group: 6 },
      { id: "Education", group: 7 },
      { id: "Mentors", group: 8 },
      { id: "Peers", group: 9 },
      { id: "Students", group: 10 },
      // Add more nodes based on the sitemap
    ],
    links: [
      { source: "Home", target: "Work" },
      { source: "Home", target: "Store" },
      { source: "Home", target: "Journal" },
      { source: "Work", target: "founder-at-mathscapes" },
      { source: "Work", target: "independent-designer" },
      { source: "Store", target: "maxwell-escape3" },
      { source: "Store", target: "maxwell-escape4" },
      { source: "Journal", target: "maxwell-escape" },
      { source: "Projects", target: "harr-cascade-based-detection" },
      { source: "Teaching", target: "building-your-own-cms" },
      // Add more links based on the sitemap
    ]
  };
  const width = 800;
  const height = 600;
  const svg = d3.select("#sitemap").append("svg")
    .attr("width", width)
    .attr("height", height);
  const simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink().id(d => d.id).distance(100))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(width / 2, height / 2));
  const link = svg.append("g")
    .attr("class", "links")
    .selectAll("line")
    .data(data.links)
    .enter().append("line")
    .attr("stroke-width", 2)
    .attr("stroke", "#999");
  const node = svg.append("g")
    .attr("class", "nodes")
    .selectAll("circle")
    .data(data.nodes)
    .enter().append("circle")
    .attr("r", 5)
    .attr("fill", d => d.group === 1 ? "blue" : d.group === 2 ? "green" : "red")
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended));
  node.append("title")
    .text(d => d.id);
  simulation
    .nodes(data.nodes)
    .on("tick", ticked);
  simulation.force("link")
    .links(data.links);
  function ticked() {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);
  }
  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
</script>
